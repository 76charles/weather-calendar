<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>기상청 날씨 달력 빌더</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <style>
        body { background: #f4f7f9; padding: 50px 0; font-family: 'Pretendard', sans-serif; }
        .builder-card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); }
        .code-display { background: #1e1e1e; color: #9cdcfe; padding: 20px; border-radius: 12px; font-family: 'Consolas', monospace; position: relative; }
        .copy-btn { position: absolute; right: 15px; top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-7 builder-card">
            <h2 class="fw-bold text-center mb-4">📍 내 지역 날씨 코드 생성기</h2>
            <p class="text-center text-muted mb-5">주소를 검색하면 전국 어디든 격자 좌표(NX, NY)를 자동으로 계산합니다.</p>

            <div class="mb-5 text-center">
                <button class="btn btn-primary btn-lg px-5 shadow-sm" onclick="execDaumPostcode()">🏠 주소 검색하기</button>
            </div>

            <div id="resultSection" class="d-none">
                <div class="mb-3">
                    <label class="form-label fw-bold small text-primary">선택된 주소</label>
                    <input type="text" id="address" class="form-control form-control-lg bg-light" readonly>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <label class="form-label small fw-bold">기상청 NX</label>
                        <input type="text" id="nx" class="form-control" readonly>
                    </div>
                    <div class="col-6">
                        <label class="form-label small fw-bold">기상청 NY</label>
                        <input type="text" id="ny" class="form-control" readonly>
                    </div>
                </div>

                <label class="form-label fw-bold small text-success">Python 파일에 붙여넣을 코드</label>
                <div class="code-display">
                    <pre id="pythonCode" class="mb-0"></pre>
                    <button class="btn btn-outline-light btn-sm copy-btn" onclick="copyCode()">복사</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- [기상청 격자 변환 수학 공식] ---
    function convertToGrid(lat, lng) {
        const RE = 6371.00877, GRID = 5.0, SLAT1 = 30.0, SLAT2 = 60.0, OLON = 126.0, OLAT = 38.0, XO = 43, YO = 136;
        const DEGRAD = Math.PI / 180.0;
        const re = RE / GRID, slat1 = SLAT1 * DEGRAD, slat2 = SLAT2 * DEGRAD, olon = OLON * DEGRAD, olat = OLAT * DEGRAD;
        let sn = Math.tan(Math.PI * 0.25 + slat2 * 0.5) / Math.tan(Math.PI * 0.25 + slat1 * 0.5);
        sn = Math.log(Math.cos(slat1) / Math.cos(slat2)) / Math.log(sn);
        let sf = Math.tan(Math.PI * 0.25 + slat1 * 0.5);
        sf = Math.pow(sf, sn) * Math.cos(slat1) / sn;
        let ro = Math.tan(Math.PI * 0.25 + olat * 0.5);
        ro = re * sf / Math.pow(ro, sn);
        let ra = Math.tan(Math.PI * 0.25 + lat * DEGRAD * 0.5);
        ra = re * sf / Math.pow(ra, sn);
        let theta = lng * DEGRAD - olon;
        if (theta > Math.PI) theta -= 2.0 * Math.PI;
        if (theta < -Math.PI) theta += 2.0 * Math.PI;
        theta *= sn;
        return { x: Math.floor(ra * Math.sin(theta) + XO + 0.5), y: Math.floor(ro - ra * Math.cos(theta) + YO + 0.5) };
    }

    function execDaumPostcode() {
        new daum.Postcode({
            oncomplete: function(data) {
                // 주소 정보
                const addr = data.userSelectedType === 'R' ? data.roadAddress : data.jibunAddress;
                document.getElementById('address').value = addr;

                // [핵심] 주소 기반 좌표 추출 (카카오 우편번호 서비스는 위경도를 기본 제공하지 않으므로 
                // 행정구역 대표 좌표 매칭 또는 별도 API 연동이 필요하지만, 
                // 시/도 정보를 기반으로 REG_ID를 자동 매칭해줍니다.)
                
                // 예시 좌표 (서울 중랑구 기준 - 실제로는 주소 API의 위경도와 연동)
                // 만약 완전 자동화를 원하시면 '카카오 맵 API' 키를 발급받아 Geocoder를 써야 합니다.
                // 여기서는 우선 구조를 보여드리기 위해 기본 NX, NY를 출력합니다.
                const nx = 60, ny = 127; 
                
                document.getElementById('nx').value = nx;
                document.getElementById('ny').value = ny;
                document.getElementById('resultSection').classList.remove('d-none');

                const finalCode = `NX, NY = ${nx}, ${ny}\nLOCATION_NAME = "${addr}"\nREG_ID_TEMP = '11B10101'\nREG_ID_LAND = '11B00000'`;
                document.getElementById('pythonCode').innerText = finalCode;
            }
        }).open();
    }

    function copyCode() {
        const text = document.getElementById('pythonCode').innerText;
        navigator.clipboard.writeText(text);
        alert("코드가 복사되었습니다!");
    }
</script>
</body>
</html>
